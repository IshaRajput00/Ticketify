<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container" style="max-width: 700px;">

    <h2>Analytics Dashboard</h2>

    <ul style="list-style: none; padding: 0; margin-top: 20px;">
        <li style="margin-bottom: 10px;">
            Total Tickets: <b th:text="${totalTickets}"></b>
        </li>
        <li style="margin-bottom: 10px;">
            Open Tickets: <b th:text="${openTickets}"></b>
        </li>
        <li style="margin-bottom: 10px;">
            In Progress Tickets: <b th:text="${inProgressTickets}"></b>
        </li>
        <li style="margin-bottom: 10px;">
            Resolved Tickets: <b th:text="${resolvedTickets}"></b>
        </li>
        <li style="margin-bottom: 10px;">
            Total Feedback Given: <b th:text="${totalFeedback}"></b>

        </li>


    </ul>

    <a class="footer-link" th:href="@{/logout}">
        Logout
    </a>

</div>

</body>
</html>
