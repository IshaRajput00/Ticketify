<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Case Manager Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <h2>Case Manager Dashboard</h2>

    <h3 style="margin-top: 20px;">Resolved Tickets</h3>

    <table>
        <tr>
            <th>Ticket ID</th>
            <th>Title</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}"></td>
            <td th:text="${ticket.title}"></td>
            <td th:text="${ticket.status}"></td>
            <td>
                <form th:action="@{/case/convert}" method="post" style="margin: 0;">
                    <input type="hidden" name="ticketId" th:value="${ticket.id}">
                    <button type="submit">
                        Convert to Case
                    </button>
<!--                    &lt;!&ndash; ADD NOTE &ndash;&gt;-->
<!--                    <a th:href="@{/agent/ticket/note(id=${ticket.id})}">-->
<!--                        Add Note-->
<!--                    </a>-->


                </form>
            </td>
        </tr>
    </table>

    <a class="footer-link" th:href="@{/logout}">
        Logout
    </a>

</div>

</body>
</html>
