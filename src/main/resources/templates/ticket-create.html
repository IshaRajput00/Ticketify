<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Ticket</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container" style="max-width: 600px;">

    <h2>Create Ticket</h2>

    <form th:action="@{/customer/ticket/create}" method="post">

        <label>Title</label>
        <input type="text" name="title" placeholder="Enter ticket title" required>

        <label>Description</label>
        <textarea name="description" rows="4" placeholder="Describe your issue" required></textarea>

        <label>Category</label>
        <input type="text" name="category" placeholder="e.g. Login, Payment, UI">

        <label>Priority</label>
        <select name="priority" required>
            <option value="">Select priority</option>
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
        </select>

        <button type="submit" style="margin-top: 10px;">
            Create Ticket
        </button>
    </form>

    <a class="footer-link" th:href="@{/customer/dashboard}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
