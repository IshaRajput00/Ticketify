<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 400px;
            margin: 120px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .test-credentials {
            margin-top: 15px;
            padding: 10px;
            background-color: #f1f5f9;
            border-left: 4px solid #007bff;
            font-size: 14px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    <form th:action="@{/login}" method="post">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>

    </form>

    <!-- Test credentials note -->
    <div class="test-credentials">
        <strong>Test Credentials (For Demo):</strong><br>
        Customer → Username: <b>customer</b>, Password: <b>1234</b><br>
        Agent → Password: <b>1234</b>
    </div>

</div>

</body>
</html>
