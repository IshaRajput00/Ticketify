<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Tickets</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <h2>My Tickets</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr th:each="ticket : ${tickets}">
            <td th:text="${ticket.id}"></td>
            <td th:text="${ticket.title}"></td>
            <td th:text="${ticket.category}"></td>
            <td th:text="${ticket.priority}"></td>
            <td th:text="${ticket.status}"></td>
            <td class="action-links">

                <!-- VIEW DETAILS -->
                <a th:href="@{/customer/ticket/view(id=${ticket.id})}">
                    View Details
                </a>

                <!-- CHAT (ALWAYS AVAILABLE) -->
                |
                <a th:href="@{/ticket/chat(ticketId=${ticket.id})}">
                    Chat with Agent
                </a>

                <!-- FEEDBACK (ONLY IF RESOLVED) -->
                <span th:if="${ticket.status.name() == 'RESOLVED'}">
                    |
                    <a th:href="@{/customer/ticket/feedback(id=${ticket.id})}">
                        Give Feedback
                    </a>
                </span>

            </td>
        </tr>
    </table>

    <a class="footer-link" th:href="@{/customer/dashboard}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
